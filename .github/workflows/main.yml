name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 1,15 * *"

jobs:
  unit_tests:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up environment variables
        run: |
          IFS='/' read -r -a parts <<< "$GITHUB_REPOSITORY"
          GITHUB_REPO="${parts[1]}"
          echo "GITHUB_REPO=$GITHUB_REPO" >> $GITHUB_ENV
          echo "PLUGINS_DIR=$(pwd)/.." >> $GITHUB_ENV
          echo "SYNC_REPO=$(pwd)/../kohaclone" >> $GITHUB_ENV

      - name: Check out Koha
        run: |
          cd ..
          # Temporary override: use OpenFifth's 25.11.o5th branch which includes required fixes
          # git clone --branch 25.11 --single-branch --depth 1 https://github.com/Koha-Community/Koha.git kohaclone
          git clone --branch 25.11.o5th --single-branch --depth 1 https://github.com/openfifth/koha.git kohaclone

      - name: Install koha-testing-docker
        run: |
          cd ..
          git clone https://gitlab.com/koha-community/koha-testing-docker.git
          cd koha-testing-docker
          cp env/defaults.env .env
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Launch KTD instance with plugins support
        run: |
          sudo sysctl -w vm.max_map_count=262144
          cd ../koha-testing-docker
          export LOCAL_USER_ID=$(id -u)
          export KTD_HOME=$(pwd)
          export SKIP_L10N=yes
          export KOHA_IMAGE=25.11
          ktd --name oracle --plugins up -d

      - name: Wait for KTD to be ready
        run: |
          export KTD_HOME=$(pwd)/../koha-testing-docker
          ktd --name oracle --wait-ready 240

      - name: Install plugins in KTD
        run: |
          export KTD_HOME=$(pwd)/../koha-testing-docker
          ktd --name oracle --shell --run "cd /kohadevbox/koha && perl misc/devel/install_plugins.pl"

      - name: Run plugin tests
        run: |
          export KTD_HOME=$(pwd)/../koha-testing-docker
          ktd --name oracle --shell --run "
            cd /kohadevbox/plugins/${{ env.GITHUB_REPO }} &&
            export KOHA_PLUGIN_DIR=\$(pwd) &&
            export PERL5LIB=\$PERL5LIB:. &&
            sudo cpanm --notest JSON::MaybeXS Path::Tiny Test::Exception TAP::Harness::JUnit &&
            JUNIT_OUTPUT_FILE=junit.xml prove -v -r -s t/ --harness=TAP::Harness::JUnit
          "

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            junit.xml
          check_name: "Test Results (Koha 25.11)"

      - name: Show logs on failure
        if: failure()
        run: |
          export KTD_HOME=$(pwd)/../koha-testing-docker
          echo "=== KTD instance status ==="
          ktd --name oracle --list || true
          echo "=== Koha error logs ==="
          ktd --name oracle --shell --run "tail -50 /var/log/koha/kohadev/plack-intranet-error.log" || true
          echo "=== Container logs ==="
          docker logs oracle-koha-1 --tail 50 || true

      - name: Cleanup KTD instance
        if: always()
        run: |
          export KTD_HOME=$(pwd)/../koha-testing-docker
          ktd --name oracle down || true

  release:
    needs: unit_tests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Koha Version Branch Name
        id: koha-version-oldstable
        uses: "bywatersolutions/github-action-koha-get-version-by-label@v2"
        with:
          version-label: "oldstable"

      - name: Read package.json
        id: package
        run: |
          echo "plugin_path=$(jq -r '.plugin.pm_path' package.json)" >> $GITHUB_OUTPUT

      - name: Build Koha Plugin kpz artifact
        id: kpz
        uses: "bywatersolutions/github-action-koha-plugin-create-kpz@master"
        with:
          release-version: ${{ github.ref_name }}
          release-name: ${{ github.event.repository.name }}
          minimum-version: ${{ steps.koha-version-oldstable.outputs.version-major-minor }}
          plugin-module: ${{ steps.package.outputs.plugin_path }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.kpz.outputs.filename }}
            CHANGELOG.md
          generate_release_notes: true
